<title>Japan Trip Flashcards — TRVL-001</title>
<style>
:root{
  --color-primary:#01696f;
  --surface-light:#f5f0e6;
  --surface-light-2:#ffffff;
  --text-light:#2b2b28;
  --text-muted-light:#6b655c;
  --surface-dark:#1c1e1f;
  --surface-dark-2:#26282a;
  --text-dark:#eef0ee;
  --text-muted-dark:#a3a7a5;
  --text-xs:0.75rem;
  --radius:16px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--surface-light);
  color:var(--text-light);
  transition:background .3s,color .3s;
}
body.dark{
  background:var(--surface-dark);
  color:var(--text-dark);
}
header{
  position:sticky;
  top:0;
  z-index:50;
  background:var(--surface-light-2);
  border-bottom:1px solid rgba(0,0,0,0.08);
  padding:16px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
}
body.dark header{
  background:var(--surface-dark-2);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.brand{
  display:flex;
  align-items:center;
  gap:16px;
  flex:1;
  min-width:0;
}
.page-title{
  margin:0;
  font-size:1.15rem;
  font-weight:700;
  line-height:1.3;
  color:var(--text-light);
}
body.dark .page-title{color:var(--text-dark);}
@media (max-width:700px){
  .page-title{font-size:0.95rem;}
}
.brand-logo{
  height:40px;
  width:auto;
  display:block;
}
.header-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
select, button{
  font-family:inherit;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.15);
  padding:8px 12px;
  font-size:0.9rem;
  background:var(--surface-light);
  color:var(--text-light);
  cursor:pointer;
}
body.dark select, body.dark button{
  background:var(--surface-dark);
  color:var(--text-dark);
  border:1px solid rgba(255,255,255,0.15);
}
#toggle-dark, #toggle-lang{
  background:var(--color-primary);
  color:#fff;
  border:none;
  font-weight:600;
}
.progress-wrap{
  padding:10px 20px 0;
  max-width:1200px;
  margin:0 auto;
}
.progress-bar-bg{
  background:rgba(0,0,0,0.08);
  border-radius:10px;
  height:8px;
  overflow:hidden;
}
body.dark .progress-bar-bg{background:rgba(255,255,255,0.1);}
.progress-bar-fill{
  height:100%;
  background:var(--color-primary);
  width:0%;
  transition:width .3s;
}
.progress-text{
  font-size:var(--text-xs);
  color:var(--text-muted-light);
  margin-top:4px;
}
body.dark .progress-text{color:var(--text-muted-dark);}
main{
  max-width:1200px;
  margin:0 auto;
  padding:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:20px;
}
.card-scene{
  perspective:1200px;
  height:300px;
}
.card{
  position:relative;
  width:100%;
  height:100%;
  transition:transform .6s;
  transform-style:preserve-3d;
  cursor:pointer;
  border-radius:var(--radius);
  box-shadow:0 4px 14px rgba(0,0,0,0.12);
}
.card.flipped{transform:rotateY(180deg);}
.card-face{
  position:absolute;
  inset:0;
  border-radius:var(--radius);
  backface-visibility:hidden;
  overflow:hidden;
  background:var(--surface-light-2);
  display:flex;
  flex-direction:column;
}
body.dark .card-face{background:var(--surface-dark-2);}
.card-front img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-front .front-body{
  padding:12px 14px;
  display:flex;
  flex-direction:column;
  gap:6px;
  flex:1;
}
.card-front h3{
  margin:0;
  font-size:1rem;
  line-height:1.3;
}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;}
.tag{
  font-size:0.65rem;
  padding:3px 8px;
  border-radius:20px;
  background:rgba(1,105,111,0.12);
  color:var(--color-primary);
  font-weight:600;
}
.done-badge{
  margin-left:auto;
  font-size:0.7rem;
  color:var(--color-primary);
  font-weight:700;
}
.flip-hint{
  font-size:var(--text-xs);
  color:var(--text-muted-light);
  margin-top:auto;
}
body.dark .flip-hint{color:var(--text-muted-dark);}
.card-back{
  transform:rotateY(180deg);
  padding:16px;
  justify-content:space-between;
}
.card-back h3{margin:0 0 8px;font-size:1.05rem;color:var(--color-primary);}
.card-back .desc{font-size:0.85rem;line-height:1.4;margin-bottom:8px;overflow-y:auto;}
.card-back .why{
  font-size:0.8rem;
  line-height:1.4;
  font-style:italic;
  color:var(--text-muted-light);
  border-top:1px solid rgba(0,0,0,0.08);
  padding-top:8px;
}
body.dark .card-back .why{color:var(--text-muted-dark);border-top:1px solid rgba(255,255,255,0.1);}
.mark-btn{
  align-self:flex-start;
  margin-top:8px;
  font-size:0.75rem;
  padding:6px 10px;
  background:var(--color-primary);
  color:#fff;
  border:none;
  border-radius:8px;
}
footer{
  text-align:center;
  padding:24px;
  font-size:var(--text-xs);
  color:var(--text-muted-light);
}
body.dark footer{color:var(--text-muted-dark);}
</style>
</head>

thplace.", "img": "https://picsum.photos/seed/kaiseki-dinner-experience/400/300", "title_es": "Experiencia de Cena Kaiseki", "category_es": "Comida", "desc_es": "Una comida tradicional de alta cocina de varios cursos que muestra ingredientes de temporada y presentaci\u00f3n art\u00edstica.", "why_es": "La forma definitiva de experimentar el refinado arte culinario japon\u00e9s en su lugar de origen."}, {"id": 31, "title": "Pontocho Alley Dining", "city": "Kyoto", "category": "Food", "desc": "A narrow riverside alley packed with traditional restaurants ranging from casual to exclusive.", "why": "A beautifully atmospheric setting for dinner, lit by lanterns along the Kamo River.", "img": "https://picsum.photos/seed/pontocho-alley-dining/400/300", "title_es": "Cena en el Callej\u00f3n Pontocho", "category_es": "Comida", "desc_es": "Un estrecho callej\u00f3n junto al r\u00edo lleno de restaurantes tradicionales, desde casuales hasta exclusivos.", "why_es": "Un entorno hermosamente lleno de ambiente para cenar, iluminado por faroles junto al r\u00edo Kamo."}, {"id": 32, "title": "Yudofu in Arashiyama", "city": "Kyoto", "category": "Food", "desc": "A simple, comforting hot tofu dish that originated with Zen Buddhist monks in Kyoto's temples.", "why": "A warming, traditional meal that pairs perfectly with a chilly November temple visit.", "img": "https://picsum.photos/seed/yudofu-in-arashiyama/400/300", "title_es": "Yudofu en Arashiyama", "category_es": "Comida", "desc_es": "Un plato reconfortante y sencillo de tofu caliente que se origin\u00f3 con monjes budistas zen en los templos de Kioto.", "why_es": "Una comida c\u00e1lida y tradicional que combina perfectamente con una visita a un templo en el fr\u00edo noviembre."}, {"id": 33, "title": "Gion Odori Dance Performance", "city": "Kyoto", "category": "Nightlife", "desc": "A rare public geisha and maiko dance performance held in Kyoto's historic geisha district.", "why": "A unique chance to see traditional performing arts itional shops with modern retail.", "why": "Great for browsing regardless of weather, from souvenirs to local fashion.", "img": "https://picsum.photos/seed/teramachi-shinkyogoku-arcades/400/300", "title_es": "Galer\u00edas Teramachi y Shinkyogoku", "category_es": "Compras", "desc_es": "Galer\u00edas comerciales cubiertas en el centro de Kioto que combinan tiendas tradicionales con comercio moderno.", "why_es": "Excelente para pasear sin importar el clima, desde recuerdos hasta moda local."}, {"id": 37, "title": "Sanjo-dori Boutiques & Sake Shops", "city": "Kyoto", "category": "Shopping", "desc": "A historic street with boutique shops, galleries, and sake tasting spots.", "why": "A charming, less touristy street for unique finds and local sake sampling.", "img": "https://picsum.photos/seed/sanjo-dori-boutiques-sake-shops/400/300", "title_es": "Boutiques y Tiendas de Sake en Sanjo-dori", "category_es": "Compras", "desc_es": "Una calle hist\u00f3rica con tiendas boutique, galer\u00edas y lugares de degustaci\u00f3n de sake.", "why_es": "Una encantadora calle menos tur\u00edstica para hallazgos \u00fanicos y degustaci\u00f3n de sake local."}, {"id": 38, "title": "Nara Day Trip", "city": "Kyoto", "category": "Day Trips", "desc": "Home to free-roaming friendly deer, the giant Buddha at Todai-ji, and Kasuga Taisha shrine.", "why": "An easy, memorable day trip combining wildlife, ancient temples, and history.", "img": "https://picsum.photos/seed/nara-day-trip/400/300", "title_es": "Excursi\u00f3n de un D\u00eda a Nara", "category_es": "Excursiones de un D\u00eda", "desc_es": "Hogar de ciervos amigables que deambulan libremente, el gigante Buda de Todai-ji y el santuario Kasuga Taisha.", "why_es": "Una excursi\u00f3n f\u00e1cil y memorable que combina vida salvaje, templos antiguos e historia."}, {"id": 39, "title": "Arashiyama & Hozugawa River Boat", "city": "Kyoto", "category": "Day Trips", "desc": "A scenic district with the bamboo grove, a monkey park, and a traditional ": "A long covered shopping street packed with fashion, cosmetics, and souvenir shops.", "why": "Convenient, weatherproof shopping right in the heart of Osaka's entertainment district.", "img": "https://picsum.photos/seed/shinsaibashi-suji-shopping-arcade/400/300", "title_es": "Galer\u00eda Comercial Shinsaibashi-suji", "category_es": "Compras", "desc_es": "Una larga galer\u00eda comercial cubierta llena de tiendas de moda, cosm\u00e9ticos y recuerdos.", "why_es": "Compras convenientes y protegidas del clima en el coraz\u00f3n del distrito de entretenimiento de Osaka."}, {"id": 46, "title": "Tenjinbashi-suji Shotengai", "city": "Osaka", "category": "Shopping", "desc": "Japan's longest covered shopping arcade, stretching over 2.6 km with local shops and eateries.", "why": "A more local, less touristy shopping experience than Dotonbori or Shinsaibashi.", "img": "https://picsum.photos/seed/tenjinbashi-suji-shotengai/400/300", "title_es": "Shotengai Tenjinbashi-suji", "category_es": "Compras", "desc_es": "La galer\u00eda comercial cubierta m\u00e1s larga de Jap\u00f3n, que se extiende m\u00e1s de 2.6 km con tiendas y restaurantes locales.", "why_es": "Una experiencia de compras m\u00e1s local y menos tur\u00edstica que Dotonbori o Shinsaibashi."}, {"id": 47, "title": "Umeda Sky Building", "city": "Osaka", "category": "Nightlife", "desc": "A futuristic skyscraper with a floating observatory offering 360-degree night views of Osaka.", "why": "One of the best sunset and nightlife-view spots in the city.", "img": "https://picsum.photos/seed/umeda-sky-building/400/300", "title_es": "Edificio Umeda Sky", "category_es": "Vida Nocturna", "desc_es": "Un rascacielos futurista con un observatorio flotante que ofrece vistas nocturnas de 360 grados de Osaka.", "why_es": "Uno de los mejores lugares para ver el atardecer y la vida nocturna de la ciudad."}, {"id": 48, "title": "Namba/Dotonbori Bar Crawl", "city": "Osaka", "category": "Nightlife", "desc": "A dense cluster of bars and izakayas surrounding the canal in Osaka's liveliest district.", "why": "Ideal for an energetic night out amid Osaka's famous neon backdrop.", "img": "https://picsum.photos/seed/namba-dotonbori-bar-crawl/400/300", "title_es": "Recorrido de Bares en Namba/Dotonbori", "category_es": "Vida Nocturna", "desc_es": "Un denso grupo de bares e izakayas alrededor del canal en el distrito m\u00e1s animado de Osaka.", "why_es": "Ideal para una noche llena de energ\u00eda en medio del famoso fondo de ne\u00f3n de Osaka."}, {"id": 49, "title": "Minoo Park Day Trip", "city": "Osaka", "category": "Nature & Foliage", "desc": "A forested park just outside the city with a scenic waterfall and vivid autumn foliage.", "why": "A quick nature escape from Osaka with some of the region's best November leaf-viewing.", "img": "https://picsum.photos/seed/minoo-park-day-trip/400/300", "title_es": "Excursi\u00f3n de un D\u00eda al Parque Minoo", "category_es": "Naturaleza y Follaje", "desc_es": "Un parque boscoso justo fuera de la ciudad con una cascada esc\u00e9nica y un v\u00edvido follaje oto\u00f1al.", "why_es": "Una r\u00e1pida escapada natural desde Osaka con algunos de los mejores colores de hojas de noviembre en la regi\u00f3n."}];

const grid = document.getElementById('card-grid');
const cityFilter = document.getElementById('city-filter');
const catFilter = document.getElementById('cat-filter');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const langToggle = document.getElementById('toggle-lang');

let visited = JSON.parse(localStorage.getItem('trvl001_visited') || '{}');
let lang = localStorage.getItem('trvl001_lang') || 'en';

const UI_TEXT = {
  en: {
    pageTitle: "Top 50 things to do: Tokyo, Kyoto, and Osaka",
    langBtn: "🌐 Español",
    flipHint: "Tap to flip →",
    visited: "✓ Visited",
    markVisited: "Mark as Visited",
    marked: "✓ Marked Visited",
    whyGo: "Why go:",
    progress: (done,total) => `${done} of ${total} places marked as visited`,
    footer: "All rights reserved. Unauthorized reproduction prohibited."
  },
  es: {
    pageTitle: "Top 50 things to do: Tokyo, Kyoto, and Osaka",
    langBtn: "🌐 English",
    flipHint: "Toca para voltear →",
    visited: "✓ Visitado",
    markVisited: "Marcar como Visitado",
    marked: "✓ Marcado Visitado",
    whyGo: "Por qué ir:",
    progress: (done,total) => `${done} de ${total} lugares marcados como visitados`,
    footer: "Todos los derechos reservados. Prohibida la reproducción no autorizada."
  }
};

function saveVisited(){
  localStorage.setItem('trvl001_visited', JSON.stringify(visited));
}

function applyLangToSelects(){
  document.querySelectorAll('#city-filter option, #cat-filter option').forEach(opt => {
    const val = opt.getAttribute(lang === 'es' ? 'data-es' : 'data-en');
    if(val) opt.textContent = val;
  });
}

function getTitle(c){ return lang === 'es' ? c.title_es : c.title; }
function getCategory(c){ return lang === 'es' ? c.category_es : c.category; }
function getDesc(c){ return lang === 'es' ? c.desc_es : c.desc; }
function getWhy(c){ return lang === 'es' ? c.why_es : c.why; }

function renderCards(){
  const city = cityFilter.value;
  const cat = catFilter.value;
  const filtered = DATA.filter(c =>
    (city === 'all' || c.city === city) &&
    (cat === 'all' || c.category === cat)
  );
  const t = UI_TEXT[lang];
  grid.innerHTML = '';
  filtered.forEach(c => {
    const scene = document.createElement('div');
    scene.className = 'card-scene';
    const isDone = !!visited[c.id];
    scene.innerHTML = `
      <div class="card" data-id="${c.id}">
        <div class="card-face card-front">
          <img src="${c.img}" alt="${getTitle(c)}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${c.id}/400/300'">
          <div class="front-body">
            <div class="tag-row">
              <span class="tag">${c.city}</span>
              <span class="tag">${getCategory(c)}</span>
              ${isDone ? `<span class="done-badge">${t.visited}</span>` : ''}
            </div>
            <h3>${getTitle(c)}</h3>
            <div class="flip-hint">${t.flipHint}</div>
          </div>
        </div>
        <div class="card-face card-back">
          <div>
            <h3>${getTitle(c)}</h3>
            <div class="desc">${getDesc(c)}</div>
            <div class="why"><strong>${t.whyGo}</strong> ${getWhy(c)}</div>
          </div>
          <button class="mark-btn" data-id="${c.id}">${isDone ? t.marked : t.markVisited}</button>
        </div>
      </div>
    `;
    grid.appendChild(scene);
  });

  grid.querySelectorAll('.card').forEach(cardEl => {
    cardEl.addEventListener('click', (e) => {
      if (e.target.classList.contains('mark-btn')) return;
      cardEl.classList.toggle('flipped');
    });
  });

  grid.querySelectorAll('.mark-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      visited[id] = !visited[id];
      saveVisited();
      renderCards();
      updateProgress();
    });
  });
}

function updateProgress(){
  const total = DATA.length;
  const done = Object.values(visited).filter(Boolean).length;
  const pct = total ? (done/total*100) : 0;
  progressFill.style.width = pct + '%';
  progressText.textContent = UI_TEXT[lang].progress(done, total);
}

function applyLanguage(){
  document.getElementById('page-title').textContent = UI_TEXT[lang].pageTitle;
  langToggle.textContent = UI_TEXT[lang].langBtn;
  applyLangToSelects();
  renderCards();
  updateProgress();
}

cityFilter.addEventListener('change', renderCards);
catFilter.addEventListener('change', renderCards);

langToggle.addEventListener('click', () => {
  lang = lang === 'en' ? 'es' : 'en';
  localStorage.setItem('trvl001_lang', lang);
  applyLanguage();
});

const darkToggle = document.getElementById('toggle-dark');
darkToggle.addEventListener('click', () => {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  darkToggle.textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
  localStorage.setItem('trvl001_dark', isDark ? '1' : '0');
});
if(localStorage.getItem('trvl001_dark') === '1'){
  document.body.classList.add('dark');
  darkToggle.textContent = '☀️ Light Mode';
}

document.getElementById('copyright-year').textContent = new Date().getFullYear();

applyLanguage();
</script>
</body>
</html>
